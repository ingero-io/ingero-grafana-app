apiVersion: 1
# Provision two Ingero datasources for the e2e suite. Each points
# at one fake-Echo container (see docker-compose.yaml). Production
# deployments configure the datasource via the Grafana UI; this
# file is for the e2e loop only and contains a dev-only bearer.
datasources:
  - name: 'Ingero echo-a'
    uid: ingero-echo-a
    type: 'ingero-gpu-datasource'
    access: proxy
    isDefault: true
    orgId: 1
    version: 1
    editable: true
    jsonData:
      endpoint: 'http://fake-echo-a:8081'
      insecureSkipVerify: false
    secureJsonData:
      bearer: 'dev-bearer'

  - name: 'Ingero echo-b'
    uid: ingero-echo-b
    type: 'ingero-gpu-datasource'
    access: proxy
    isDefault: false
    orgId: 1
    version: 1
    editable: true
    jsonData:
      endpoint: 'http://fake-echo-b:8081'
      insecureSkipVerify: false
    secureJsonData:
      bearer: 'dev-bearer'
