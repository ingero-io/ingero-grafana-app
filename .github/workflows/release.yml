# Tag-driven release pipeline.
#
# On `v*` tag push:
#   1. `gates` job verifies the repo is public and the CHANGELOG has
#      a matching [<version>] section. A failed assertion aborts the
#      release.
#   2. `release` job builds the plugin bundle (app frontend +
#      datasource frontend + cross-compiled Go backend binaries),
#      packages it into a zip, and publishes a GitHub Release with the
#      zip attached and the matching CHANGELOG section as release
#      notes.
#
# The build mirrors the CI workflow's build job rather than the
# grafana/plugin-actions/build-plugin action, because this repo is an
# app plugin with a nested datasource sub-plugin whose Go backend
# lives at datasource/ - a layout the generic action does not handle.
#
# Prereleases (`-rcN`, `-betaN`, `-alphaN`) are auto-flagged so they
# don't replace the "latest" pointer on GitHub.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions: read-all

jobs:
  gates:
    name: Release-time invariants
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      prerelease: ${{ steps.tag.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - id: tag
        name: Extract tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          case "$tag" in
            *-rc*|*-beta*|*-alpha*) prerelease=true ;;
            *) prerelease=false ;;
          esac
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "prerelease=$prerelease" >> $GITHUB_OUTPUT
          echo "Tag $tag (version $version, prerelease=$prerelease)"

      - name: Verify repo is public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          visibility=$(gh repo view --json visibility -q .visibility)
          if [ "$visibility" != "PUBLIC" ]; then
            echo "Repo visibility is $visibility; refusing to release a private plugin."
            exit 1
          fi
          echo "Repo is public."

      - name: CHANGELOG asserts
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, re, sys, pathlib
          v = os.environ['VERSION']
          text = pathlib.Path('CHANGELOG.md').read_text()
          if not re.search(rf'^## \[{re.escape(v)}\]', text, re.MULTILINE):
              sys.exit(f'CHANGELOG missing entry for {v} (expected `## [{v}]`)')
          print(f'CHANGELOG ok for v{v}')
          PY

  release:
    name: Build + package + publish
    needs: gates
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install dependencies
        run: |
          npm ci
          cd datasource && npm ci

      - name: Build frontend
        run: npm run build

      - name: Build backend binaries
        run: |
          set -euo pipefail
          mkdir -p dist/datasource
          cd datasource
          for os in linux darwin; do
            for arch in amd64 arm64; do
              GOOS=$os GOARCH=$arch go build -trimpath -ldflags="-s -w" \
                -o "../dist/datasource/gpx_ingero_gpu_${os}_${arch}" ./pkg
            done
          done
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" \
            -o "../dist/datasource/gpx_ingero_gpu_windows_amd64.exe" ./pkg

      - name: Package plugin
        id: pkg
        env:
          TAG: ${{ needs.gates.outputs.tag }}
        run: |
          set -euo pipefail
          archive="ingero-gpu-app-${TAG}.zip"
          # Grafana expects the bundle rooted at the plugin id dir.
          cp -r dist ingero-gpu-app
          zip -r "$archive" ingero-gpu-app
          sha1=$(sha1sum "$archive" | cut -d' ' -f1)
          echo "archive=$archive" >> $GITHUB_OUTPUT
          echo "sha1=$sha1" >> $GITHUB_OUTPUT
          echo "Built $archive (sha1 $sha1)"

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ needs.gates.outputs.version }}
        run: |
          python3 - <<'PY' > release-notes.md
          import os, re, pathlib
          v = os.environ['VERSION']
          text = pathlib.Path('CHANGELOG.md').read_text()
          m = re.search(rf'^## \[{re.escape(v)}\][^\n]*\n(.*?)(?=^## \[|\Z)', text, re.MULTILINE | re.DOTALL)
          print((m.group(1) if m else '').strip())
          PY
          echo "" >> release-notes.md
          echo "**Plugin archive SHA1:** \`${{ steps.pkg.outputs.sha1 }}\`" >> release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.gates.outputs.tag }}
          PRERELEASE: ${{ needs.gates.outputs.prerelease }}
        run: |
          set -euo pipefail
          flag=""
          if [ "$PRERELEASE" = "true" ]; then flag="--prerelease"; fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            $flag \
            "${{ steps.pkg.outputs.archive }}"
